<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Lost & Found</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body class="bg-[#060d1a] text-slate-100 min-h-screen flex flex-col">

  <!-- Background -->
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>

  <!-- Global Spinner -->
  <div id="globalSpinner" style="display:none;"><div class="spinner-ring"></div></div>

  <!-- Navbar -->
  <nav class="navbar fixed top-0 left-0 right-0 z-50">
    <div class="max-w-7xl mx-auto px-4 flex items-center justify-between h-16">
      <a href="index.html" class="flex items-center gap-2.5">
        <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center font-display font-bold text-white text-sm">L&F</div>
        <span class="font-display font-bold text-white text-sm tracking-wider hidden sm:block">LOST<span class="text-blue-400">&</span>FOUND</span>
      </a>
      <a href="index.html" class="text-slate-400 hover:text-slate-200 text-sm transition-colors">← Back to Home</a>
    </div>
  </nav>

  <!-- Main -->
  <main class="flex-1 flex items-center justify-center px-4 pt-20 pb-10 relative z-10">
    <div class="w-full max-w-md">
      <!-- Logo -->
      <div class="text-center mb-8 animate-fade-in-up">
        <div class="inline-flex w-16 h-16 rounded-2xl bg-blue-600 items-center justify-center font-display font-black text-white text-xl shadow-2xl shadow-blue-600/40 mb-4">L&F</div>
        <h1 class="font-display text-2xl font-bold text-white">Welcome Back</h1>
        <p class="text-slate-400 text-sm mt-1" id="subtitleText">Sign in to your account</p>
      </div>

      <!-- Card -->
      <div class="glass-card rounded-2xl p-8 animate-fade-in-up delay-100">

        <!-- Toggle Tabs -->
        <div class="flex rounded-xl overflow-hidden border border-white/10 mb-8">
          <button id="loginTab"
            class="flex-1 py-3 text-sm font-semibold transition-all bg-blue-600 text-white">
            Login
          </button>
          <button id="signupTab"
            class="flex-1 py-3 text-sm font-semibold transition-all text-slate-400 hover:text-slate-200">
            Sign Up
          </button>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="space-y-4">
          <div>
            <label class="block text-xs font-semibold text-slate-400 mb-2">Email Address</label>
            <input id="loginEmail" type="email" placeholder="you@example.com" required
              class="input-field w-full px-4 py-3 rounded-xl text-sm"/>
          </div>
          <div>
            <div class="flex items-center justify-between mb-2">
              <label class="block text-xs font-semibold text-slate-400">Password</label>
              <a href="forgot-password.html" class="text-xs font-semibold text-blue-400 hover:text-blue-300 transition-colors">Forgot Password?</a>
            </div>
            <div class="relative">
              <input id="loginPassword" type="password" placeholder="••••••••" required
                class="input-field w-full px-4 py-3 rounded-xl text-sm pr-12"/>
              <button type="button" class="toggle-pw absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300" data-target="loginPassword">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
              </button>
            </div>
          </div>
          <button type="submit"
            class="btn-primary w-full py-3.5 rounded-xl text-white font-semibold text-sm mt-2">
            Sign In
          </button>
        </form>

        <!-- Signup Form (hidden) -->
        <form id="signupForm" class="hidden space-y-4">
          <div>
            <label class="block text-xs font-semibold text-slate-400 mb-2">Full Name</label>
            <input id="signupName" type="text" placeholder="Your full name" required
              class="input-field w-full px-4 py-3 rounded-xl text-sm"/>
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-400 mb-2">Email Address</label>
            <input id="signupEmail" type="email" placeholder="you@example.com" required
              class="input-field w-full px-4 py-3 rounded-xl text-sm"/>
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-400 mb-2">Password</label>
            <div class="relative">
              <input id="signupPassword" type="password" placeholder="Min. 6 characters" required
                class="input-field w-full px-4 py-3 rounded-xl text-sm pr-12"/>
              <button type="button" class="toggle-pw absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300" data-target="signupPassword">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
              </button>
            </div>
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-400 mb-2">Confirm Password</label>
            <input id="signupConfirm" type="password" placeholder="Re-enter password" required
              class="input-field w-full px-4 py-3 rounded-xl text-sm"/>
            <p id="pwMatchError" class="text-red-400 text-xs mt-1 hidden">Passwords do not match.</p>
          </div>
          <button type="submit"
            class="btn-primary w-full py-3.5 rounded-xl text-white font-semibold text-sm mt-2">
            Create Account
          </button>
        </form>

        <!-- Divider -->
        <div class="flex items-center gap-3 my-6">
          <div class="flex-1 h-px bg-white/5"></div>
          <span class="text-slate-600 text-xs">or</span>
          <div class="flex-1 h-px bg-white/5"></div>
        </div>

        <p class="text-center text-slate-500 text-xs">
          By continuing, you agree to our
          <span class="text-blue-400">Terms of Service</span> and
          <span class="text-blue-400">Privacy Policy</span>.
        </p>
      </div>

      <!-- Footer text -->
      <p class="text-center text-slate-600 text-sm mt-6 animate-fade-in-up delay-200">
        <span id="switchText">Don't have an account?</span>
        <button id="switchBtn" class="text-blue-400 font-semibold ml-1 hover:text-blue-300 transition-colors">Sign Up</button>
      </p>
    </div>
  </main>

  <script type="module">
    import { login, signUp, watchAuth } from "./js/auth.js";

    const params = new URLSearchParams(window.location.search);
    let isLogin = params.get("signup") !== "1";

    // If already logged in, redirect
    watchAuth((user) => { window.location.href = "dashboard.html"; });

    // Tab switching
    function showForm(loginMode) {
      isLogin = loginMode;
      document.getElementById("loginForm").classList.toggle("hidden",  !loginMode);
      document.getElementById("signupForm").classList.toggle("hidden",  loginMode);
      document.getElementById("loginTab").classList.toggle("bg-blue-600", loginMode);
      document.getElementById("loginTab").classList.toggle("text-white",  loginMode);
      document.getElementById("loginTab").classList.toggle("text-slate-400", !loginMode);
      document.getElementById("signupTab").classList.toggle("bg-blue-600", !loginMode);
      document.getElementById("signupTab").classList.toggle("text-white", !loginMode);
      document.getElementById("signupTab").classList.toggle("text-slate-400", loginMode);
      document.getElementById("subtitleText").textContent = loginMode ? "Sign in to your account" : "Create a free account";
      document.getElementById("switchText").textContent   = loginMode ? "Don't have an account?" : "Already have an account?";
      document.getElementById("switchBtn").textContent    = loginMode ? "Sign Up" : "Login";
    }

    showForm(isLogin);

    document.getElementById("loginTab").addEventListener("click",  () => showForm(true));
    document.getElementById("signupTab").addEventListener("click", () => showForm(false));
    document.getElementById("switchBtn").addEventListener("click", () => showForm(!isLogin));

    // Login submit
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email    = document.getElementById("loginEmail").value;
      const password = document.getElementById("loginPassword").value;
      const user = await login(email, password);
      if (user) setTimeout(() => window.location.href = "dashboard.html", 800);
    });

    // Signup submit
    document.getElementById("signupForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const name     = document.getElementById("signupName").value;
      const email    = document.getElementById("signupEmail").value;
      const password = document.getElementById("signupPassword").value;
      const confirm  = document.getElementById("signupConfirm").value;
      if (password !== confirm) {
        document.getElementById("pwMatchError").classList.remove("hidden");
        return;
      }
      document.getElementById("pwMatchError").classList.add("hidden");
      const user = await signUp(name, email, password);
      if (user) setTimeout(() => window.location.href = "dashboard.html", 800);
    });

    // Password visibility toggle
    document.querySelectorAll(".toggle-pw").forEach(btn => {
      btn.addEventListener("click", () => {
        const input = document.getElementById(btn.dataset.target);
        input.type = input.type === "password" ? "text" : "password";
      });
    });
  </script>
</body>
</html>
