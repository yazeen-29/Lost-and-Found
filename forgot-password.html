<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password — Lost & Found</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body class="bg-[#060d1a] text-slate-100 min-h-screen flex flex-col">

  <!-- Background -->
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>

  <!-- Global Spinner -->
  <div id="globalSpinner" style="display:none;"><div class="spinner-ring"></div></div>

  <!-- Navbar -->
  <nav class="navbar fixed top-0 left-0 right-0 z-50">
    <div class="max-w-7xl mx-auto px-4 flex items-center justify-between h-16">
      <a href="index.html" class="flex items-center gap-2.5">
        <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center font-display font-bold text-white text-sm">L&F</div>
        <span class="font-display font-bold text-white text-sm tracking-wider hidden sm:block">LOST<span class="text-blue-400">&</span>FOUND</span>
      </a>
      <a href="login.html" class="text-slate-400 hover:text-slate-200 text-sm transition-colors">← Back to Login</a>
    </div>
  </nav>

  <!-- Main -->
  <main class="flex-1 flex items-center justify-center px-4 pt-20 pb-10 relative z-10">
    <div class="w-full max-w-md">
      <!-- Logo -->
      <div class="text-center mb-8 animate-fade-in-up">
        <div class="inline-flex w-16 h-16 rounded-2xl bg-blue-600 items-center justify-center font-display font-black text-white text-xl shadow-2xl shadow-blue-600/40 mb-4">L&F</div>
        <h1 class="font-display text-2xl font-bold text-white">Reset Password</h1>
        <p class="text-slate-400 text-sm mt-1">Enter your email to receive a reset link</p>
      </div>

      <!-- Card -->
      <div class="glass-card rounded-2xl p-8 animate-fade-in-up delay-100">

        <!-- Reset Password Form -->
        <form id="resetForm" class="space-y-4">
          <div>
            <label class="block text-xs font-semibold text-slate-400 mb-2" for="resetEmail">Email Address</label>
            <input id="resetEmail" type="email" placeholder="you@example.com" required
              class="input-field w-full px-4 py-3 rounded-xl text-sm"/>
          </div>
          
          <button type="submit"
            class="btn-primary w-full py-3.5 rounded-xl text-white font-semibold text-sm mt-2 flex items-center justify-center">
            <span>Send Reset Link</span>
          </button>
        </form>
        
        <!-- Divider -->
        <div class="flex items-center gap-3 my-6">
          <div class="flex-1 h-px bg-white/5"></div>
          <span class="text-slate-600 text-xs">or</span>
          <div class="flex-1 h-px bg-white/5"></div>
        </div>

        <p class="text-center text-slate-500 text-sm">
          Remembered your password? <a href="login.html" class="text-blue-400 font-semibold hover:text-blue-300 transition-colors">Sign In</a>
        </p>

      </div>
    </div>
  </main>

  <script type="module">
    import { resetPassword, watchAuth } from "./js/auth.js";

    // If already logged in, redirect
    watchAuth((user) => { window.location.href = "dashboard.html"; });

    // Reset submit
    document.getElementById("resetForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("resetEmail").value;
      const success = await resetPassword(email);
      if (success) {
        document.getElementById("resetEmail").value = "";
      }
    });
  </script>
</body>
</html>
